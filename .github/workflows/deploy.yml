name: Deploy

on:
  push:
    branches: [main]
    # Skip the pipeline for changes that don't affect the app or backend:
    # docs, Terraform infra (applied manually), and the self-hosted Docker path.
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - 'infra/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-stack.yml'
      - 'Makefile'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'
      - 'prod.env.example'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - 'infra/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'docker-stack.yml'
      - 'Makefile'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'
      - 'prod.env.example'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run typecheck
        working-directory: app
      - run: npm test
        working-directory: app

  migrate:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  deploy-frontend:
    if: github.ref == 'refs/heads/main'
    needs: migrate
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      # vercel build runs the Vite build (project root_directory = app); the
      # VITE_* vars are baked in at that point, exactly as before. The Vercel
      # project itself stores no env vars — CI is the single source of truth.
      - name: Deploy to Vercel
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
          VITE_FACEBOOK_ENABLED: ${{ vars.VITE_FACEBOOK_ENABLED }}
