# Production stack for Docker Swarm — self-hosts the whole Ensayadero backend
# (Postgres, GoTrue, PostgREST, Realtime, Edge function, nginx gateway) plus
# the built PWA. See DEPLOY.md.
#
# Deploy:  set -a; source prod.env; set +a
#          docker stack deploy -c docker-stack.yml ensayadero
#
# Values come from prod.env (interpolated at deploy time). Keep prod.env out of
# git and chmod 600 — it holds the secrets.

x-restart: &restart
  restart_policy:
    condition: any
    delay: 5s

services:
  # ── Postgres (with pg_cron / pg_net, internal Supabase roles) ──────────
  db:
    image: supabase/postgres:15.8.1.085
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: "5432"
      # used by the init script to sync the internal role passwords
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    configs:
      - source: db_init
        target: /docker-entrypoint-initdb.d/zz-init-roles.sh
        mode: 0555
    networks: [ensayadero]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      <<: *restart
      # the volume is node-local: pin the DB to one node (label it, see DEPLOY.md)
      placement:
        constraints: [node.labels.ensayadero_db == true]

  # ── Auth (GoTrue) ──────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.158.1
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${PUBLIC_API_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${DB_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${PUBLIC_APP_URL}
      GOTRUE_URI_ALLOW_LIST: ${PUBLIC_APP_URL}/auth/callback,${PUBLIC_APP_URL}/reset-password,${PUBLIC_APP_URL}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # SMTP (Resend or any provider)
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: Ensayadero
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/callback
      GOTRUE_MAILER_URLPATHS_RECOVERY: /reset-password
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/callback
      # auth-form hardening (see docker-compose.yml for rationale)
      GOTRUE_PASSWORD_MIN_LENGTH: "8"
      GOTRUE_PASSWORD_HIBP_ENABLED: "true"
      GOTRUE_MAILER_OTP_EXP: "900"
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "true"
      GOTRUE_RATE_LIMIT_EMAIL_SENT: "10"
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
      # CAPTCHA (Cloudflare Turnstile) — optional
      GOTRUE_SECURITY_CAPTCHA_ENABLED: ${TURNSTILE_CAPTCHA_ENABLED:-false}
      GOTRUE_SECURITY_CAPTCHA_PROVIDER: turnstile
      GOTRUE_SECURITY_CAPTCHA_SECRET: ${TURNSTILE_SECRET:-}
      # Google OAuth — optional
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${PUBLIC_API_URL}/auth/v1/callback
      # Meta/Facebook OAuth (Instagram login) — optional
      GOTRUE_EXTERNAL_FACEBOOK_ENABLED: ${FACEBOOK_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_FACEBOOK_CLIENT_ID: ${FACEBOOK_OAUTH_CLIENT_ID:-}
      GOTRUE_EXTERNAL_FACEBOOK_SECRET: ${FACEBOOK_OAUTH_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_FACEBOOK_REDIRECT_URI: ${PUBLIC_API_URL}/auth/v1/callback
    networks: [ensayadero]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      <<: *restart

  # ── Migrations (run-once job) ──────────────────────────────────────────
  migrate:
    image: ${IMAGE_PREFIX:-ensayadero}/migrate:${TAG:-latest}
    environment:
      PGHOST: db
      PGUSER: supabase_admin
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: postgres
    networks: [ensayadero]
    deploy:
      mode: replicated-job
      restart_policy:
        condition: none
      placement:
        constraints: [node.labels.ensayadero_db == true]

  # ── REST API (PostgREST) ───────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://authenticator:${DB_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_MAX_ROWS: "1000"
      PGRST_SERVER_PORT: "3000"
    networks: [ensayadero]
    deploy:
      <<: *restart

  # ── Realtime (websockets) ──────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.30.23
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${REALTIME_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    networks: [ensayadero]
    deploy:
      <<: *restart

  # ── Edge function (Deno) ───────────────────────────────────────────────
  functions:
    image: ${IMAGE_PREFIX:-ensayadero}/functions:${TAG:-latest}
    environment:
      SUPABASE_URL: http://gateway:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      APP_URL: ${PUBLIC_APP_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    networks: [ensayadero]
    deploy:
      <<: *restart

  # ── API gateway (nginx → /auth /rest /functions /realtime) ─────────────
  gateway:
    image: nginx:alpine
    configs:
      - source: gateway_conf
        target: /etc/nginx/conf.d/default.conf
    ports:
      - target: 8000
        published: ${API_PORT:-8000}
        protocol: tcp
        mode: ingress
    networks: [ensayadero]
    deploy:
      <<: *restart

  # ── Frontend PWA (built static, served by nginx) ───────────────────────
  app:
    image: ${IMAGE_PREFIX:-ensayadero}/app:${TAG:-latest}
    ports:
      - target: 80
        published: ${APP_PORT:-8080}
        protocol: tcp
        mode: ingress
    networks: [ensayadero]
    deploy:
      <<: *restart

  # ── Reminder cron: POST the notifications function every minute ────────
  cron:
    image: curlimages/curl:8.11.1
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          curl -s -X POST http://gateway:8000/functions/v1/send-notifications \
            -H "Authorization: Bearer ${SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" -d '{}' >/dev/null 2>&1 || true
          sleep 60
        done
    networks: [ensayadero]
    deploy:
      <<: *restart

configs:
  # Swarm configs are immutable: bump CONFIG_VERSION in prod.env after editing
  # either file so a new config object is created on the next deploy.
  gateway_conf:
    name: ensayadero_gateway_${CONFIG_VERSION:-v1}
    file: ./docker/gateway.conf
  db_init:
    name: ensayadero_dbinit_${CONFIG_VERSION:-v1}
    file: ./docker/db-init.prod.sh

volumes:
  pgdata:

networks:
  ensayadero:
    driver: overlay
    attachable: true
