# Stack COMPLETO de desarrollo local — sin Supabase CLI.
# Servicios: Postgres (imagen supabase con pg_cron/pg_net), GoTrue (auth),
# PostgREST (API), gateway nginx (emula Kong: /auth/v1, /rest/v1, /functions/v1),
# Edge function en Deno, runner de migraciones y frontend Vite.
#
#   make up      → levanta todo (gateway en :54321, app en :5173, db en :54322)
#   make reset   → recrea DB aplicando migraciones + seed
#
# Claves JWT: demo públicas de Supabase self-host — SOLO para local.

x-jwt: &jwt-env
  JWT_SECRET: &jwt-secret your-super-secret-jwt-token-with-at-least-32-characters-long
  # Tokens generados con el JWT_SECRET de abajo (iss supabase-local, exp 2036)
  ANON_KEY: &anon-key eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiaWF0IjoxNzM1Njg5NjAwLCJleHAiOjIwODI3NTg0MDB9.JOdqQjQ623ht1NBb6JtdPmy2iDc6S7QloNGa5YBQ4Ao
  SERVICE_ROLE_KEY: &service-key eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtbG9jYWwiLCJpYXQiOjE3MzU2ODk2MDAsImV4cCI6MjA4Mjc1ODQwMH0.hKugUZ3psc796Vm1pvDwNp_KGtbvF22bnuyE6pjGQFk

services:
  db:
    image: supabase/postgres:15.8.1.085
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db-init.sql:/docker-entrypoint-initdb.d/zz-init-roles.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 3s
      timeout: 3s
      retries: 20

  auth:
    image: supabase/gotrue:v2.158.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:5173
      GOTRUE_URI_ALLOW_LIST: http://localhost:5173/auth/callback,http://localhost:5173
      GOTRUE_JWT_SECRET: *jwt-secret
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      # email+password habilitado SOLO en local para crear usuarios de prueba
      # sin OAuth (make seed-users). En prod solo Google.
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      # Google OAuth opcional en local: GOOGLE_OAUTH_ENABLED=true + client id/secret
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: http://localhost:54321/auth/v1/callback
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9999/health"]
      interval: 3s
      timeout: 3s
      retries: 30

  migrate:
    image: supabase/postgres:15.8.1.085
    depends_on:
      auth:
        condition: service_healthy
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./docker/migrate.sh:/migrate.sh:ro
    environment:
      PGHOST: db
      PGUSER: supabase_admin
      PGPASSWORD: postgres
      PGDATABASE: postgres
    entrypoint: ["bash", "/migrate.sh"]
    restart: "no"

  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: *jwt-secret
      PGRST_DB_MAX_ROWS: "1000"

  functions:
    image: denoland/deno:alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    working_dir: /functions/send-notifications
    command: ["run", "--allow-net", "--allow-env", "index.ts"]
    volumes:
      - ./supabase/functions:/functions:ro
    environment:
      SUPABASE_URL: http://gateway:8000
      SUPABASE_SERVICE_ROLE_KEY: *service-key
      APP_URL: http://localhost:5173
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Ensayo <dev@localhost>}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:dev@localhost}

  gateway:
    image: nginx:alpine
    depends_on:
      - auth
      - rest
    ports:
      - "54321:8000"
    volumes:
      - ./docker/gateway.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - gateway
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: *anon-key
      VITE_APP_URL: http://localhost:5173
      VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}

  # Preview del build de producción: make preview
  app-preview:
    profiles: ["preview"]
    build:
      context: ./app
      args:
        VITE_SUPABASE_URL: http://localhost:54321
        VITE_SUPABASE_ANON_KEY: *anon-key
        VITE_APP_URL: http://localhost:8080
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "8080:80"

volumes:
  db_data:
  app_node_modules:
