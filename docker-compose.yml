# FULL local development stack — no Supabase CLI.
# Services: Postgres (supabase image with pg_cron/pg_net), GoTrue (auth),
# PostgREST (API), nginx gateway (emulates Kong: /auth/v1, /rest/v1, /functions/v1),
# Edge function on Deno, migration runner and Vite frontend.
#
#   make up      → bring up everything (gateway on :54321, app on :5173, db on :54322)
#   make reset   → recreate the DB applying migrations + seed
#
# JWT keys: public Supabase self-host demo keys — LOCAL ONLY.

x-jwt: &jwt-env
  JWT_SECRET: &jwt-secret your-super-secret-jwt-token-with-at-least-32-characters-long
  # Tokens generated with the JWT_SECRET below (iss supabase-local, exp 2036)
  ANON_KEY: &anon-key eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiaWF0IjoxNzM1Njg5NjAwLCJleHAiOjIwODI3NTg0MDB9.JOdqQjQ623ht1NBb6JtdPmy2iDc6S7QloNGa5YBQ4Ao
  SERVICE_ROLE_KEY: &service-key eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtbG9jYWwiLCJpYXQiOjE3MzU2ODk2MDAsImV4cCI6MjA4Mjc1ODQwMH0.hKugUZ3psc796Vm1pvDwNp_KGtbvF22bnuyE6pjGQFk

services:
  db:
    image: supabase/postgres:15.8.1.085
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db-init.sql:/docker-entrypoint-initdb.d/zz-init-roles.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 3s
      timeout: 3s
      retries: 20

  auth:
    image: supabase/gotrue:v2.158.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://${DEV_HOST:-localhost}:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://${DEV_HOST:-localhost}:5173
      GOTRUE_URI_ALLOW_LIST: http://${DEV_HOST:-localhost}:5173/auth/callback,http://${DEV_HOST:-localhost}:5173/reset-password,http://${DEV_HOST:-localhost}:5173
      GOTRUE_JWT_SECRET: *jwt-secret
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      # Email+password registration: email activation + password recovery.
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # Local SMTP → mailpit (mail catcher, UI at http://localhost:54324).
      # The `make seed-users` test users are created with email_confirm=true
      # via the admin API, so they don't need to open the email.
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@ensayo.local
      GOTRUE_SMTP_SENDER_NAME: Ensayadero
      # Email links must hit GoTrue's /verify endpoint (through the gateway);
      # GoTrue then redirects to the app's redirect_to after verifying the token.
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      # --- Auth form hardening (registration/recovery) ---
      # Password policy: minimum length + leaked-password check (HIBP,
      # k-anonymity: the password never leaves the server).
      GOTRUE_PASSWORD_MIN_LENGTH: "8"
      GOTRUE_PASSWORD_HIBP_ENABLED: "true"
      # Activation/recovery links: expire after 15 min and are single-use.
      GOTRUE_MAILER_OTP_EXP: "900"
      # Branded bilingual (es/en via user_metadata.lang) mobile-friendly templates,
      # served by the gateway from docker/mail-templates/.
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: http://gateway:8000/mail-templates/confirmation.html
      GOTRUE_MAILER_TEMPLATES_RECOVERY: http://gateway:8000/mail-templates/recovery.html
      GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE: http://gateway:8000/mail-templates/email-change.html
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: '{{ if eq (printf "%v" .Data.lang) "en" }}Confirm your Ensayadero account{{ else }}Confirma tu cuenta de Ensayadero{{ end }}'
      GOTRUE_MAILER_SUBJECTS_RECOVERY: '{{ if eq (printf "%v" .Data.lang) "en" }}Reset your Ensayadero password{{ else }}Restablece tu contraseña de Ensayadero{{ end }}'
      GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE: '{{ if eq (printf "%v" .Data.lang) "en" }}Confirm your new email{{ else }}Confirma tu nuevo email{{ end }}'
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "true"
      # Anti email-bombing / volume-based enumeration: emails/hour per IP.
      GOTRUE_RATE_LIMIT_EMAIL_SENT: "10"
      # Real client IP behind the nginx gateway (otherwise all requests share a bucket).
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
      # Minimum frequency between emails per user (5s locally so flows are testable;
      # hosted prod uses Supabase's larger default).
      GOTRUE_SMTP_MAX_FREQUENCY: 5s
      # Cloudflare Turnstile CAPTCHA (optional): TURNSTILE_CAPTCHA_ENABLED=true +
      # secret. The frontend must have TURNSTILE_SITE_KEY (site key).
      GOTRUE_SECURITY_CAPTCHA_ENABLED: ${TURNSTILE_CAPTCHA_ENABLED:-false}
      GOTRUE_SECURITY_CAPTCHA_PROVIDER: turnstile
      GOTRUE_SECURITY_CAPTCHA_SECRET: ${TURNSTILE_SECRET:-}
      # Google OAuth optional locally: GOOGLE_OAUTH_ENABLED=true + client id/secret
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: http://${DEV_HOST:-localhost}:54321/auth/v1/callback
      # Meta/Facebook OAuth optional locally (login with linked Instagram accounts):
      # FACEBOOK_OAUTH_ENABLED=true + client id/secret from the Meta app.
      GOTRUE_EXTERNAL_FACEBOOK_ENABLED: ${FACEBOOK_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_FACEBOOK_CLIENT_ID: ${FACEBOOK_OAUTH_CLIENT_ID:-}
      GOTRUE_EXTERNAL_FACEBOOK_SECRET: ${FACEBOOK_OAUTH_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_FACEBOOK_REDIRECT_URI: http://${DEV_HOST:-localhost}:54321/auth/v1/callback
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9999/health"]
      interval: 3s
      timeout: 3s
      retries: 30

  # Local mail catcher: GoTrue delivers the activation and recovery emails here.
  # Web UI to read them at http://localhost:54324.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "54324:8025"

  migrate:
    image: supabase/postgres:15.8.1.085
    depends_on:
      auth:
        condition: service_healthy
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./docker/migrate.sh:/migrate.sh:ro
    environment:
      PGHOST: db
      PGUSER: supabase_admin
      PGPASSWORD: postgres
      PGDATABASE: postgres
    entrypoint: ["bash", "/migrate.sh"]
    restart: "no"

  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: *jwt-secret
      PGRST_DB_MAX_ROWS: "1000"

  realtime:
    image: supabase/realtime:v2.30.23
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: *jwt-secret
      SECRET_KEY_BASE: realtimerealtimerealtimerealtimerealtimerealtimerealtime12
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"

  functions:
    image: denoland/deno:alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    working_dir: /functions/send-notifications
    command: ["run", "--allow-net", "--allow-env", "index.ts"]
    volumes:
      - ./supabase/functions:/functions:ro
    environment:
      SUPABASE_URL: http://gateway:8000
      SUPABASE_SERVICE_ROLE_KEY: *service-key
      APP_URL: http://localhost:5173
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # All local emails are caught by mailpit (UI at :54324); Resend is never
      # hit in dev. Unset MAILPIT_URL to test real Resend delivery.
      MAILPIT_URL: http://mailpit:8025
      EMAIL_FROM: ${EMAIL_FROM:-Ensayadero <dev@localhost>}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:dev@localhost}

  gateway:
    image: nginx:alpine
    depends_on:
      - auth
      - rest
    ports:
      - "54321:8000"
    volumes:
      - ./docker/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/mail-templates:/mail-templates:ro

  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - gateway
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # DEV_HOST: set to your machine's LAN IP (e.g. 192.168.0.11) in .env to
      # test from a phone on the same network; defaults to localhost.
      VITE_SUPABASE_URL: http://${DEV_HOST:-localhost}:54321
      VITE_SUPABASE_ANON_KEY: *anon-key
      VITE_APP_URL: http://${DEV_HOST:-localhost}:5173
      VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VITE_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}

  # Production build preview: make preview
  app-preview:
    profiles: ["preview"]
    build:
      context: ./app
      args:
        VITE_SUPABASE_URL: http://localhost:54321
        VITE_SUPABASE_ANON_KEY: *anon-key
        VITE_APP_URL: http://localhost:8080
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "8080:80"

volumes:
  db_data:
  app_node_modules:
