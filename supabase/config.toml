project_id = "ensayo"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/auth/callback",
  "http://localhost:5173/reset-password",
]
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 8

[auth.email]
enable_signup = true
# Require email activation before sign-in is allowed.
enable_confirmations = true
double_confirm_changes = true

# Cloudflare Turnstile CAPTCHA (the docker stack enables it via env). Kept here
# documented for `supabase start`; enabling requires the secret.
[auth.captcha]
enabled = false
provider = "turnstile"
secret = "env(TURNSTILE_SECRET)"

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"

# Meta/Facebook: supported path for login with linked Instagram accounts
# (Supabase has no native Instagram provider).
[auth.external.facebook]
enabled = true
client_id = "env(FACEBOOK_OAUTH_CLIENT_ID)"
secret = "env(FACEBOOK_OAUTH_CLIENT_SECRET)"

# Mail catcher for `supabase start` (the docker stack uses mailpit).
[inbucket]
enabled = true
port = 54324

[edge_runtime]
enabled = true

[analytics]
enabled = false
