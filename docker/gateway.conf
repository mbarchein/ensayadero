# Gateway local: emula el enrutado de Kong de Supabase.
# supabase-js espera /auth/v1, /rest/v1 y /functions/v1 bajo una misma URL.
# Kong añade CORS en cloud; aquí lo hace nginx para auth y functions
# (PostgREST ya emite sus propias cabeceras CORS).

server {
    listen 8000;

    location /auth/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        # GoTrue ya emite Access-Control-Allow-Origin en respuestas reales
        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
    }

    location /rest/v1/ {
        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
    }

    location /functions/v1/send-notifications {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, X-Client-Info" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin $http_origin always;
        proxy_pass http://functions:8000/;
        proxy_set_header Host $host;
    }

    location / {
        return 404 '{"error":"ruta no gestionada por el gateway local"}';
    }
}
