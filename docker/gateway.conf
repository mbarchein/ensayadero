# Local gateway: emulates Supabase's Kong routing.
# supabase-js expects /auth/v1, /rest/v1 and /functions/v1 under a single URL.
# Kong adds CORS in the cloud; here nginx does it for auth and functions
# (PostgREST already emits its own CORS headers).

server {
    listen 8000;

    location /auth/v1/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        # GoTrue already emits Access-Control-Allow-Origin on real responses
        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward the host:port the client actually used (e.g. localhost:54321),
        # not nginx's internal $server_port (8000): GoTrue builds the email
        # verification links from this header.
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /rest/v1/ {
        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
    }

    location /functions/v1/send-notifications {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, X-Client-Info" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        add_header Access-Control-Allow-Origin $http_origin always;
        proxy_pass http://functions:8000/;
        proxy_set_header Host $host;
    }

    # Custom GoTrue email templates: fetched by the auth container at send time.
    location /mail-templates/ {
        root /;
        try_files $uri =404;
    }

    # Realtime (WebSocket)
    location /realtime/v1/ {
        proxy_pass http://realtime:4000/socket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host realtime-dev.localhost;
        proxy_read_timeout 3600s;
    }

    # Sanity check for humans hitting the base URL in a browser
    location = / {
        default_type application/json;
        return 200 '{"status":"ok","routes":["/auth/v1","/rest/v1","/realtime/v1","/functions/v1/send-notifications"]}';
    }

    location / {
        return 404 '{"error":"route not handled by the local gateway"}';
    }
}
